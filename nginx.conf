server {
    listen 80;

    # Serve React SPA — fallback to index.html for client-side routing
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST API to backend
    location /api {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy WebSocket (STOMP over SockJS) to backend
    # Explicit Upgrade/Connection headers are required — without them nginx
    # drops the HTTP upgrade and the WebSocket connection silently fails.
    location /ws {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;   # must be >> heartbeat interval (30s); default 60s is too low
    }
}
