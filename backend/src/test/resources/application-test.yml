spring:
  devtools:
    restart:
      enabled: false  # Testcontainers manages its own lifecycle; DevTools restart shifts ports after @DynamicPropertySource captures them
  mail:
    host: localhost
    port: 1025

app:
  uploads-dir: /tmp/chat-test-uploads
  # Set very high in tests so general test suites don't exhaust the rate limiter.
  # NF6RateLimitTest overrides this to 10 via @TestPropertySource.
  login-rate-limit: 10000

chat:
  presence:
    afk-timeout-seconds: 2
