spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/chat
    username: chat
    password: chat
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: mailhog
    port: 1025
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 21MB

server:
  port: 8080

jwt:
  secret: "${JWT_SECRET:local-dev-secret-change-in-production-min-32-chars}"
  access-token-expiry-minutes: 15
  refresh-token-expiry-days: 7
  refresh-token-expiry-days-keep-signed-in: 30

app:
  uploads-dir: /app/uploads

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
